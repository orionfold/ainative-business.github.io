# Project-scoped Codex configuration.
# This file is loaded only when the operator trusts this repository in Codex.

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
personality = "pragmatic"
project_doc_max_bytes = 65536
project_doc_fallback_filenames = ["CLAUDE.md", "HANDOFF.md"]

[features]
hooks = true
shell_snapshot = true
multi_agent = true

[shell_environment_policy]
include_only = [
  "PATH",
  "HOME",
  "USER",
  "SHELL",
  "PWD",
  "TMPDIR",
  "DISPLAY",
  "XDG_RUNTIME_DIR",
  "SSH_AUTH_SOCK",
  "GIT_AUTHOR_NAME",
  "GIT_AUTHOR_EMAIL",
  "GIT_COMMITTER_NAME",
  "GIT_COMMITTER_EMAIL",
  "HF_HOME",
  "HF_HUB_CACHE",
  "HF_DATASETS_CACHE",
  "HF_HUB_DISABLE_XET",
  "ARENA_DB",
  "FK_ARENA_HOME",
  "FK_ARENA_OWNER_DIR",
  "FK_ARENA_RUNTIME_CONTAINERS",
  "FK_EVAL_SENTINEL_DIR",
  "FK_SFT_RUN_ARMED",
  "OPENROUTER_API_KEY",
  "HF_TOKEN",
  "NGC_API_KEY",
]
