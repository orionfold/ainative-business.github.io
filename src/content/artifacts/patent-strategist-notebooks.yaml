positioning:
  headline: Run the patent-strategist build — and use the model — on a Spark or a free cloud GPU
  problem: >-
    The artifact → card → article loop sells the outcome but offers no runnable
    on-ramp: a researcher who wants to reproduce the fine-tune, or a developer
    who wants to call the model, has to reconstruct the journey from prose.
    These two notebooks close that gap. The builder notebook walks the full
    baseline → corpus → train → quantize → publish journey as typed fieldkit API
    calls; the user notebook calls the model on real patent-prosecution tasks
    and surfaces its reasoning chains. Both are one-click via Open in Colab /
    Open in Kaggle and run offline on a DGX Spark.
  use_cases:
    - "Builder: reproduce the build — baseline, corpus gates, backend decision, train, probe, quantize, publish — as fieldkit calls"
    - "User: claim construction, MPEP-grounded office-action drafting, prior-art relevance, and licensing-scenario analysis with reasoning chains surfaced"
    - "User: ground answers in MPEP text with fieldkit.rag and gate quality with fieldkit.eval scorers"
    - "Both: run the whole workflow offline on a DGX Spark or on a free Colab / Kaggle GPU (dual-path, runtime-detected)"
  audience: >-
    AI researchers and engineers who want to reproduce the build, and app
    developers who want to call the model — on Spark-class hardware (GB10,
    128 GB unified memory) or a free cloud GPU.
known_drift:
  - item: Cloud (Colab / Kaggle) path serves the Q4_K_M quant; the Spark path serves Q5_K_M
    bound: One quant level apart — Q4_K_M wikitext perplexity 11.30 vs Q5_K_M 10.97 (~0.33 higher); both run the identical code path. See the sibling GGUF card.
  - item: The builder notebook's heavy steps (baseline, corpus, train, probe, quantize) render the recorded Spark run, not a live re-execution
    bound: 5 recorded Spark-only cells; the remaining cells (feasibility envelope, backend decision, the four viz figures, publish dry-run) run live on any runtime.
