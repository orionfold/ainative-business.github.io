# Pre-commit hooks for the fieldkit package.
#
# Install once per clone:
#   cd fieldkit && pre-commit install
#
# Run on every staged change automatically; manual full-tree check with:
#   cd fieldkit && pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        files: ^fieldkit/
      - id: end-of-file-fixer
        files: ^fieldkit/
      - id: check-yaml
        files: ^fieldkit/
      - id: check-toml
        files: ^fieldkit/
      - id: check-added-large-files
        files: ^fieldkit/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^fieldkit/.+\.py$
      - id: ruff-format
        files: ^fieldkit/.+\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^fieldkit/src/.+\.py$
        additional_dependencies:
          - httpx>=0.27
          - tenacity>=8.5
          - numpy>=1.26
          - typer>=0.12

  - repo: local
    hooks:
      - id: apache-license-header
        name: Apache-2.0 license header
        entry: fieldkit/scripts/check_license_header.py
        language: python
        types: [python]
        files: ^fieldkit/src/.+\.py$
      - id: spark-capabilities-sync
        name: spark-capabilities.json mirror is in sync
        entry: fieldkit/scripts/sync_capabilities.py
        language: python
        pass_filenames: false
        files: ^(scripts/lib/spark-capabilities\.json|fieldkit/src/fieldkit/capabilities/data/spark-capabilities\.json)$
