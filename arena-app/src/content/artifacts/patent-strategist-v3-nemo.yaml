lane_summary: >-
  The canonical NeMo Framework fine-tune in full BF16 precision — the
  highest-fidelity weights, ready for transformers / vLLM GPU inference. This is
  the lane the Unsloth-vs-NeMo bakeoff favored: NeMo trained 26% faster than the
  Unsloth sibling and landed a better-calibrated model (~0.9 lower perplexity,
  44% longer patent-strategic reasoning chains) from an identical recipe. Reach
  for the GGUF sibling when you need offline llama.cpp / Ollama inference in a
  smaller memory envelope.
positioning:
  headline: Offline patent-prosecution reasoning on Spark-class hardware
  problem: >-
    Patent prosecution work — claim construction, MPEP-grounded office-action
    responses, Markush analysis, doctrine-of-equivalents reasoning — happens
    inside firms that can't ship privileged client text to a hosted frontier
    API. This release distills DeepSeek-R1's chain-of-thought reasoning onto
    a 5,000-row synthetic patent-reasoning corpus so a single Spark-class box
    can run the workflow offline, with full IRAC-shaped reasoning chains.
  use_cases:
    - Claim construction (Markush groups, doctrine of equivalents)
    - MPEP-grounded office-action argument drafting
    - Prior-art relevance + non-obviousness reasoning chains
    - Patent-licensing scenario analysis (most-favored-licensee, FTO)
  audience: >-
    Patent attorneys, prosecution-team engineers, and IP-strategy teams running
    privileged workflows offline on Spark-class hardware (GB10, 128 GB unified
    memory) or comparable edge devices.
known_drift:
  - item: '"metes-and-times" terminology'
    bound: Two known terminology drifts inherited from the v3 synthetic corpus; balance of probe answers (~99%) cite real MPEP sections.
  - item: Fabricated MPEP §2163.05(s) citation
    bound: Same scope as above — corpus-generator artifact, not a model-wide hallucination pattern. Real §2163.05 has subsections (a)–(f) on written-description support.
